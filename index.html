<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <style>
        .weapons {
            display: flex;
            justify-content: flex-start;
            column-gap: 25px;
        }

        .buttonWrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            row-gap: 25px;
        }

        button {
            height: 50px;
            width: 100px;
            font-size: 20px;
        }

        .scoreBoard {
            display: flex;
            justify-content: space-evenly;
            width: 1000px;
            column-gap: 50px;
            border: 5px solid black;
        }

        .scoreBoardWrapper {
            margin: 15px;
            display: flex;
            border: 5px solid blue;
            justify-content: center;
        }

        span,
        p {
            margin: 10px;
            display: flex;
            align-items: center;
            /* border: 2px solid red; */
            font-size: 20px;
        }

        .finalScoreBoard {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px;
            /* border: 5px solid blue; */
        }

        .restart {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="scoreBoardWrapper">
        <div class="scoreBoard">
            <span>Human</span>
            <p class="humanScore">0</p>
            <p class="computerScore">0</p><span>Computer</span>
        </div>

    </div>

    <div class="buttonWrapper">
        <div class="weapons">
            <button>Rock</button>
            <button>Paper</button>
            <button>Scissors</button>
        </div>

        <div>
            <button class ="restartBtn">Restart</button>
        </div>

    </div>

    <div class="finalScoreBoard">
        <p class="choicesMessage"></p>
        <p class="finalResult"></p>
        <p class="restart"></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
